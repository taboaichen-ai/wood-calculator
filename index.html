<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木工裁切視覺化計算板</title>
    <style>
        /* 白底極簡風設計 */
        :root {
            --border-color: #e5e5e5;
            --text-main: #333333;
            --text-light: #888888;
            --bg-hover: #fafafa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .icon { display: inline-block; width: 1.2em; height: 1.2em; vertical-align: text-bottom; margin-right: 5px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-title { width: 1.4em; height: 1.4em; vertical-align: middle; stroke: #795548; margin-right: 8px; }

        h1 { font-size: 22px; font-weight: 600; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px 4px; cursor: pointer; color: var(--text-light); background-color: var(--bg-hover); border: 1px solid var(--border-color); border-radius: 6px; font-weight: 500; font-size: 15px; transition: all 0.2s; }
        .tab.active { color: #fff; background-color: var(--text-main); border-color: var(--text-main); font-weight: 600; }

        .input-group { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; width: 100%; }
        input, select { padding: 8px 4px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: #999; }
        button { background-color: #fff; color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
        button:hover { background-color: var(--bg-hover); }
        
        .action-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .btn-primary { background-color: var(--text-main); color: #fff; border: none; font-weight: 600;}
        .btn-green { background-color: #2e7d32; color: #fff; border: none; font-weight: 600;}
        .btn-blue { background-color: #1976d2; color: #fff; border: none; font-weight: 600;}
        .btn-delete { padding: 8px; flex-shrink: 0; color: #d32f2f; border-color: #e5e5e5; }

        .result-section { margin-top: 25px; padding-top: 20px; border-top: 1px dashed var(--border-color); }
        .summary-box { background-color: var(--bg-hover); border: 1px solid var(--border-color); padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        
        .lumber-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .lumber-bar-container { flex: 1; height: 40px; background-color: var(--bg-hover); border: 2px solid var(--text-main); display: flex; position: relative; }
        .lumber-multiplier { font-weight: 600; min-width: 50px; text-align: right; color: var(--text-main); font-size: 14px; }
        .cut-piece { height: 100%; border-right: 1px solid var(--text-main); background-color: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 12px; overflow: hidden; white-space: nowrap; box-sizing: border-box; }

        .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .board-wrapper { border: 2px solid var(--text-main); background-color: var(--bg-hover); position: relative; width: 100%; box-sizing: border-box; }
        .board-piece { position: absolute; border: 1px solid var(--text-main); background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; box-sizing: border-box; overflow: hidden; text-align: center; padding: 2px; }
        .board-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .board-label { font-weight: 600; font-size: 15px; }
        .board-multiplier { font-weight: bold; font-size: 15px; color: #d32f2f; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; }
            .container { max-width: 100%; }
            .board-container-box { page-break-inside: avoid; break-inside: avoid; margin-bottom: 40px !important; }
            .lumber-row { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="no-print">
        <svg class="icon icon-title" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        木工裁切計算板
    </h1>
    
    <div class="tabs no-print">
        <div class="tab active" id="tab-board" onclick="switchTab('board')">板材計算 (2D)</div>
        <div class="tab" id="tab-lumber" onclick="switchTab('lumber')">角材計算 (1D)</div>
    </div>

    <div id="board-section">
        <div class="no-print">
            <div style="margin-bottom: 15px;">
                <select id="board-type" style="width: auto; margin-bottom: 5px;">
                    <option value="122,244">四八板 (122 × 244 cm)</option>
                    <option value="91.5,213.5">三七板 (91.5 × 213.5 cm)</option>
                </select>
                <div style="font-size: 12px; color: var(--text-light);">*每次切割包含 4mm 耗損 (鋸片+誤差)</div>
            </div>

            <div id="board-inputs">
                <div class="input-group">
                    <input type="text" placeholder="名稱" style="flex: 2; min-width: 0;" value="板一">
                    <input type="number" placeholder="長" style="flex: 1; min-width: 0;" value="120">
                    <input type="number" placeholder="寬" style="flex: 1; min-width: 0;" value="40">
                    <input type="number" placeholder="數量" style="flex: 1.2; min-width: 0;" value="20">
                    <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="名稱" style="flex: 2; min-width: 0;" value="板二">
                    <input type="number" placeholder="長" style="flex: 1; min-width: 0;" value="40">
                    <input type="number" placeholder="寬" style="flex: 1; min-width: 0;" value="19">
                    <input type="number" placeholder="數量" style="flex: 1.2; min-width: 0;" value="30">
                    <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="名稱" style="flex: 2; min-width: 0;" value="板三">
                    <input type="number" placeholder="長" style="flex: 1; min-width: 0;" value="120">
                    <input type="number" placeholder="寬" style="flex: 1; min-width: 0;" value="20">
                    <input type="number" placeholder="數量" style="flex: 1.2; min-width: 0;" value="10">
                    <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
                </div>
            </div>

            <div class="action-buttons">
                <button onclick="addInputRow('board-inputs', true)" style="flex: 1;">+ 新增</button>
                <button class="btn-green" onclick="calculateBoard('waste')" style="flex: 1.5;">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line></svg>
                    最少損料
                </button>
                <button class="btn-blue" onclick="calculateBoard('cuts')" style="flex: 1.5;">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line></svg>
                    最少刀數
                </button>
                <button onclick="window.print()" style="flex: 1;">
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    列印
                </button>
            </div>
        </div>

        <div id="board-result" class="result-section" style="display: none;">
            <h2 style="font-size: 18px; margin-top:0;">板材切割圖紙</h2>
            <div id="board-summary" class="summary-box"></div>
            <div id="board-visuals" class="board-grid"></div>
        </div>
    </div>

    <div id="lumber-section" style="display: none;">
        <div class="no-print">
            <div style="margin-bottom: 15px;">
                <select id="lumber-type" style="width: auto; margin-bottom: 5px;">
                    <option value="305">十尺 (305 cm)</option>
                    <option value="366">十二尺 (366 cm)</option>
                </select>
                <div style="font-size: 12px; color: var(--text-light);">*每次切割自動扣除 3mm 鋸片損耗</div>
            </div>

            <div id="lumber-inputs">
                <div class="input-group">
                    <input type="text" placeholder="名稱" style="flex: 2; min-width: 0;" value="主結構">
                    <input type="number" placeholder="長度" style="flex: 1.5; min-width: 0;" value="210">
                    <input type="number" placeholder="數量" style="flex: 1; min-width: 0;" value="15">
                    <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
                </div>
            </div>

            <div class="action-buttons">
                <button onclick="addInputRow('lumber-inputs', false)" style="flex: 1;">+ 新增</button>
                <button class="btn-primary" onclick="calculateLumber()" style="flex: 2;">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line></svg>
                    開始計算
                </button>
                <button onclick="window.print()" style="flex: 1;">
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    列印
                </button>
            </div>
        </div>

        <div id="lumber-result" class="result-section" style="display: none;">
            <h2 style="font-size: 18px; margin-top:0;">角材叫貨清單與切割圖</h2>
            <div id="lumber-summary" class="summary-box"></div>
            <div id="lumber-visuals" style="margin-top: 20px;"></div>
        </div>
    </div>

</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        if(tab === 'lumber') {
            document.getElementById('lumber-section').style.display = 'block';
            document.getElementById('board-section').style.display = 'none';
        } else {
            document.getElementById('lumber-section').style.display = 'none';
            document.getElementById('board-section').style.display = 'block';
        }
    }

    function addInputRow(containerId, isBoard) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = 'input-group';
        if(isBoard) {
            div.innerHTML = `
                <input type="text" placeholder="名稱" style="flex: 2; min-width: 0;">
                <input type="number" placeholder="長" style="flex: 1; min-width: 0;">
                <input type="number" placeholder="寬" style="flex: 1; min-width: 0;">
                <input type="number" placeholder="數量" style="flex: 1.2; min-width: 0;" value="1">
                <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
            `;
        } else {
            div.innerHTML = `
                <input type="text" placeholder="名稱" style="flex: 2; min-width: 0;">
                <input type="number" placeholder="長度" style="flex: 1.5; min-width: 0;">
                <input type="number" placeholder="數量" style="flex: 1; min-width: 0;" value="1">
                <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
            `;
        }
        container.appendChild(div);
    }

    // ==========================================
    // 1D 角材計算
    // ==========================================
    function calculateLumber() {
        const visualContainer = document.getElementById('lumber-visuals');
        const summaryContainer = document.getElementById('lumber-summary');
        visualContainer.innerHTML = ''; summaryContainer.innerHTML = '';
        
        const stockType = document.getElementById('lumber-type');
        const stockLength = parseFloat(stockType.value);
        const stockName = stockType.options[stockType.selectedIndex].text;
        const sawLoss = 0.3; 
        
        let requests = []; let reqSummaryText = [];
        const rows = document.querySelectorAll('#lumber-inputs .input-group');
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const name = inputs[0].value || '未命名';
            const length = parseFloat(inputs[1].value);
            const qty = parseInt(inputs[2].value);
            if (length > 0 && qty > 0) {
                reqSummaryText.push(`${name}(${length}cm) × ${qty}`);
                for (let i = 0; i < qty; i++) requests.push({ name, length });
            }
        });

        if(requests.length === 0) return alert("請輸入至少一筆有效的角材需求");
        requests.sort((a, b) => b.length - a.length);

        let stocks = [];
        requests.forEach(req => {
            let placed = false;
            for (let i = 0; i < stocks.length; i++) {
                let requiredSpace = req.length + (stocks[i].cuts.length > 0 ? sawLoss : 0);
                if (stocks[i].remaining >= requiredSpace) {
                    stocks[i].cuts.push(req);
                    stocks[i].remaining -= requiredSpace;
                    placed = true; break;
                }
            }
            if (!placed) stocks.push({ totalLength: stockLength, remaining: stockLength - req.length, cuts: [req] });
        });

        let groupedStocks = {};
        stocks.forEach(stock => {
            let signature = stock.cuts.map(c => `${c.name}:${c.length}`).join('|');
            if(!groupedStocks[signature]) groupedStocks[signature] = { stock: stock, count: 1 };
            else groupedStocks[signature].count++;
        });

        document.getElementById('lumber-result').style.display = 'block';
        summaryContainer.innerHTML = `<strong>【條件核對】</strong><br>母材：${stockName}<br>需求：${reqSummaryText.join('、')}<br><br><strong style="font-size:16px; color:#d32f2f;">總共需叫貨： ${stocks.length} 支${stockName}</strong>`;
        
        Object.values(groupedStocks).forEach(group => {
            const stock = group.stock;
            const count = group.count;
            const rowWrapper = document.createElement('div'); rowWrapper.className = 'lumber-row';
            const barContainer = document.createElement('div'); barContainer.className = 'lumber-bar-container';
            
            stock.cuts.forEach(cut => {
                const percentage = (cut.length / stockLength) * 100;
                const piece = document.createElement('div'); piece.className = 'cut-piece';
                piece.style.width = `${percentage}%`; piece.innerText = `${cut.name} (${cut.length})`;
                barContainer.appendChild(piece);
            });

            if (stock.remaining > 0) {
                const remPercentage = (stock.remaining / stockLength) * 100;
                const rem = document.createElement('div');
                rem.style.width = `${remPercentage}%`; rem.style.display = 'flex'; rem.style.alignItems = 'center'; rem.style.justifyContent = 'center'; rem.style.fontSize = '12px'; rem.style.color = 'var(--text-light)';
                rem.innerText = `餘 ${stock.remaining.toFixed(1)}`; barContainer.appendChild(rem);
            }

            const multiplier = document.createElement('div'); multiplier.className = 'lumber-multiplier'; multiplier.innerText = `× ${count}`;
            rowWrapper.appendChild(barContainer); rowWrapper.appendChild(multiplier); visualContainer.appendChild(rowWrapper);
        });
    }

    // ==========================================
    // 2D 板材計算 - MaxRects 演算法 (導入左下角疊磚法則)
    // ==========================================
    class MaxRectsPacker {
        constructor(width, height) {
            this.binWidth = width;
            this.binHeight = height;
            this.freeRects = [{x: 0, y: 0, w: width, h: height}];
        }

        insert(width, height, method) {
            let newNode = this.scoreRect(width, height, method);
            if (newNode.h === 0) return null; 

            let numRectanglesToProcess = this.freeRects.length;
            for (let i = 0; i < numRectanglesToProcess; ++i) {
                if (this.splitFreeNode(this.freeRects[i], newNode)) {
                    this.freeRects.splice(i, 1);
                    --i;
                    --numRectanglesToProcess;
                }
            }
            this.pruneFreeList();
            return newNode;
        }

        scoreRect(width, height, method) {
            let newNode = {x: 0, y: 0, w: 0, h: 0};
            let bestScore1 = Number.MAX_VALUE;
            let bestScore2 = Number.MAX_VALUE;

            for (let i = 0; i < this.freeRects.length; ++i) {
                let freeRect = this.freeRects[i];
                
                // 嘗試【不轉向】塞入
                if (freeRect.w >= width && freeRect.h >= height) {
                    let score = this.calculateScore(freeRect, width, height, method);
                    if (score.score1 < bestScore1 || (score.score1 === bestScore1 && score.score2 < bestScore2)) {
                        newNode.x = freeRect.x; newNode.y = freeRect.y;
                        newNode.w = width; newNode.h = height;
                        bestScore1 = score.score1; bestScore2 = score.score2;
                    }
                }
                // 嘗試【轉向 90 度】塞入
                if (freeRect.w >= height && freeRect.h >= width) {
                    let score = this.calculateScore(freeRect, height, width, method);
                    if (score.score1 < bestScore1 || (score.score1 === bestScore1 && score.score2 < bestScore2)) {
                        newNode.x = freeRect.x; newNode.y = freeRect.y;
                        newNode.w = height; newNode.h = width;
                        bestScore1 = score.score1; bestScore2 = score.score2;
                    }
                }
            }
            return newNode;
        }

        calculateScore(freeRect, width, height, method) {
            if (method === 'BAF') { 
                // 最少損料：最佳面積適應 (Best Area Fit)
                let leftoverX = Math.abs(freeRect.w - width);
                let leftoverY = Math.abs(freeRect.h - height);
                return { score1: (freeRect.w * freeRect.h) - (width * height), score2: Math.min(leftoverX, leftoverY) };
            } else { 
                // 最少刀數：左下角疊磚法則 (Bottom-Left Rule)
                // 永遠優先找 Y 座標最小 (最底層) 且 X 座標最小 (最左邊) 的空間！
                // 強烈排斥垂直旋轉 (因為這會大幅增加 Y 座標高度)，自然形成最整齊的水平層架！
                return { score1: freeRect.y + height, score2: freeRect.x + width };
            }
        }

        splitFreeNode(freeNode, usedNode) {
            if (usedNode.x >= freeNode.x + freeNode.w || usedNode.x + usedNode.w <= freeNode.x ||
                usedNode.y >= freeNode.y + freeNode.h || usedNode.y + usedNode.h <= freeNode.y) {
                return false;
            }

            if (usedNode.x < freeNode.x + freeNode.w && usedNode.x + usedNode.w > freeNode.x) {
                if (usedNode.y > freeNode.y && usedNode.y < freeNode.y + freeNode.h) {
                    let newNode = Object.assign({}, freeNode);
                    newNode.h = usedNode.y - newNode.y;
                    this.freeRects.push(newNode);
                }
                if (usedNode.y + usedNode.h < freeNode.y + freeNode.h) {
                    let newNode = Object.assign({}, freeNode);
                    newNode.y = usedNode.y + usedNode.h;
                    newNode.h = freeNode.y + freeNode.h - (usedNode.y + usedNode.h);
                    this.freeRects.push(newNode);
                }
            }

            if (usedNode.y < freeNode.y + freeNode.h && usedNode.y + usedNode.h > freeNode.y) {
                if (usedNode.x > freeNode.x && usedNode.x < freeNode.x + freeNode.w) {
                    let newNode = Object.assign({}, freeNode);
                    newNode.w = usedNode.x - newNode.x;
                    this.freeRects.push(newNode);
                }
                if (usedNode.x + usedNode.w < freeNode.x + freeNode.w) {
                    let newNode = Object.assign({}, freeNode);
                    newNode.x = usedNode.x + usedNode.w;
                    newNode.w = freeNode.x + freeNode.w - (usedNode.x + usedNode.w);
                    this.freeRects.push(newNode);
                }
            }
            return true;
        }

        pruneFreeList() {
            for (let i = 0; i < this.freeRects.length; ++i) {
                for (let j = i + 1; j < this.freeRects.length; ++j) {
                    if (this.isContained(this.freeRects[i], this.freeRects[j])) {
                        this.freeRects.splice(i, 1);
                        --i; break;
                    }
                    if (this.isContained(this.freeRects[j], this.freeRects[i])) {
                        this.freeRects.splice(j, 1);
                        --j;
                    }
                }
            }
        }

        isContained(a, b) {
            return a.x >= b.x && a.y >= b.y && a.x + a.w <= b.x + b.w && a.y + a.h <= b.y + b.h;
        }
    }

    function calculateBoard(mode) {
        const visualContainer = document.getElementById('board-visuals');
        const summaryContainer = document.getElementById('board-summary');
        visualContainer.innerHTML = ''; summaryContainer.innerHTML = '';

        const boardType = document.getElementById('board-type').value.split(',');
        const boardW = parseFloat(boardType[0]);
        const boardH = parseFloat(boardType[1]);
        const boardName = document.getElementById('board-type').options[document.getElementById('board-type').selectedIndex].text;
        
        const loss = 0.4; // 耗損 4mm
        const vBoardW = boardW + loss;
        const vBoardH = boardH + loss;

        let requests = [];
        let reqSummaryText = [];
        let hasError = false;
        
        const rows = document.querySelectorAll('#board-inputs .input-group');
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const name = inputs[0].value || '未命名';
            let l = parseFloat(inputs[1].value);
            let w = parseFloat(inputs[2].value);
            const qty = parseInt(inputs[3].value);
            
            if (l > 0 && w > 0 && qty > 0) {
                reqSummaryText.push(`${name}(${l}x${w}) × ${qty}`);
                if (!(l <= boardW && w <= boardH) && !(w <= boardW && l <= boardH)) {
                    alert(`錯誤：「${name}」尺寸 (${l}x${w}) 超出母板最大尺寸！`);
                    hasError = true;
                }
                for (let i = 0; i < qty; i++) {
                    requests.push({ 
                        name, 
                        originalL: Math.max(l, w), originalW: Math.min(l, w),
                        l: Math.max(l, w) + loss, w: Math.min(l, w) + loss 
                    });
                }
            }
        });

        if(hasError) return;
        if(requests.length === 0) return alert("請輸入至少一筆有效的板材需求");

        // 依據不同按鈕模式進行智慧排序
        if (mode === 'cuts') {
            // 最少刀數：確保先排大板，再排小板，讓疊磚牆的地基更穩固
            requests.sort((a, b) => {
                let maxA = Math.max(a.l, a.w); let maxB = Math.max(b.l, b.w);
                if (maxB !== maxA) return maxB - maxA;
                return Math.min(b.l, b.w) - Math.min(a.l, a.w);
            });
        } else {
            // 最少損料：面積遞減排序，獲得最佳空間利用率
            requests.sort((a, b) => (b.l * b.w) - (a.l * a.w) || Math.max(b.l, b.w) - Math.max(a.l, a.w));
        }

        let boards = [];

        requests.forEach(req => {
            let placed = false;
            // 嘗試塞入現有的母板
            for (let i = 0; i < boards.length; i++) {
                let packer = boards[i].packer;
                // 切換核心：cuts 模式使用 BL (左下角疊磚法則)，waste 模式使用 BAF (面積適應)
                let placement = packer.insert(req.w, req.l, mode === 'cuts' ? 'BL' : 'BAF');
                
                if (placement) {
                    boards[i].rects.push({ ...req, x: placement.x, y: placement.y, drawW: placement.w, drawH: placement.h });
                    placed = true; break;
                }
            }
            // 如果所有板子都塞不下，開啟一張全新的四八板
            if (!placed) {
                let packer = new MaxRectsPacker(vBoardW, vBoardH);
                let placement = packer.insert(req.w, req.l, mode === 'cuts' ? 'BL' : 'BAF');
                if (placement) {
                    let newBoard = { packer: packer, rects: [] };
                    newBoard.rects.push({ ...req, x: placement.x, y: placement.y, drawW: placement.w, drawH: placement.h });
                    boards.push(newBoard);
                }
            }
        });

        let groupedBoards = {};
        boards.forEach(board => {
            let sigArr = board.rects.map(r => `${r.name}:${r.originalL}x${r.originalW}@${Math.round(r.x*10)}_${Math.round(r.y*10)}`);
            sigArr.sort();
            let signature = sigArr.join('|');
            if (!groupedBoards[signature]) groupedBoards[signature] = { board: board, count: 1 };
            else groupedBoards[signature].count++;
        });

        let modeLabel = mode === 'cuts' ? '最少刀數 (直線排列/左下角法則)' : '最少損料 (最大矩形)';
        let modeColor = mode === 'cuts' ? '#1976d2' : '#2e7d32'; 
        let rulerIcon = `<svg class="icon" viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"></path><path d="m14.5 12.5 2-2"></path><path d="m11.5 9.5 2-2"></path><path d="m8.5 6.5 2-2"></path><path d="m17.5 15.5 2-2"></path></svg>`;

        document.getElementById('board-result').style.display = 'block';
        summaryContainer.innerHTML = `
            <div style="font-size: 18px; font-weight: 900; color: ${modeColor}; margin-bottom: 10px; border-bottom: 2px solid ${modeColor}; padding-bottom: 5px; display: flex; align-items: center;">
                ${rulerIcon} ${modeLabel}
            </div><br>
            <strong>【條件核對】</strong><br>
            母板：${boardName}<br>
            需求：${reqSummaryText.join('、')}<br>
            <br>
            <strong style="font-size:16px; color:#d32f2f;">總共需叫貨： ${boards.length} 張${boardName}</strong>
        `;

        let displayIndex = 1;
        Object.values(groupedBoards).forEach(group => {
            const board = group.board;
            const count = group.count;
            const wrapperBox = document.createElement('div'); wrapperBox.className = 'board-container-box';
            const header = document.createElement('div'); header.className = 'board-header';
            const label = document.createElement('div'); label.className = 'board-label'; label.innerText = `圖樣 #${displayIndex++}`;
            const multiplier = document.createElement('div'); multiplier.className = 'board-multiplier'; multiplier.innerText = `× ${count} 張`;
            header.appendChild(label); header.appendChild(multiplier); wrapperBox.appendChild(header);

            const boardDiv = document.createElement('div'); boardDiv.className = 'board-wrapper';
            const ratio = (boardH / boardW) * 100; boardDiv.style.paddingBottom = `${ratio}%`;

            board.rects.forEach(rect => {
                const piece = document.createElement('div'); piece.className = 'board-piece';
                const leftPct = (rect.x / vBoardW) * 100; const topPct = (rect.y / vBoardH) * 100;
                const widthPct = ((rect.drawW - loss) / vBoardW) * 100; const heightPct = ((rect.drawH - loss) / vBoardH) * 100;
                piece.style.left = `${leftPct}%`; piece.style.top = `${topPct}%`; piece.style.width = `${widthPct}%`; piece.style.height = `${heightPct}%`;
                
                let isRotated = Math.abs(rect.drawW - rect.l) < 0.01;
                let displayW = isRotated ? rect.originalL : rect.originalW;
                let displayH = isRotated ? rect.originalW : rect.originalL;

                piece.innerHTML = `<strong>${rect.name}</strong><span style="font-size:14px; font-weight:600;">${displayW} x ${displayH}</span>`;
                boardDiv.appendChild(piece);
            });

            wrapperBox.appendChild(boardDiv); visualContainer.appendChild(wrapperBox);
        });
    }
</script>
</body>
</html>
